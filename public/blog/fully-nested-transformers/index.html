const MD = "# tl;dr\nWe Study what happens when more structure is added to nested models beyond what already exists. We designed an architecture that fully nests a hierarchy of smaller Transformers inside larger Transformers. Submodels share intermediate computations, meaning all their outputs can be produced from a single forward pass and can be cascaded. The key ingredient is structured matrices: block lower triangular weights keep the residual stream of smaller models as the prefix of larger models'. Perhaps surprisingly, performance stays strong. We release code and models for the community to build on! \n# Introduction\n\nA persistent notion in machine learning is that structure can enable useful properties, and the properties you get depend entirely on the structure imposed. Nesting is one such choice of structure. A nested model is one structured to contain smaller submodels inside of it, granting economic benefits: train once, deploy at many inference budgets. Add some *more structure* and what happens? Can we gain *even more desirable properties*? Turns out, the answer is yes! We can take the nesting structure a step further and gain some new benefits, such as:\n1. **Efficient token-level routing** via computation-sharing submodel cascades,\n2. **Self-speculative decoding** with a hierarchy of draft models,\n3. **Elastic embedding models** that trade inference latency for output granularity.\n\nIn this blog, we go into detail about this *fully nested* structure. First, we give background on regular nested models. Then, we introduce the properties we'd like to gain with more nested structure and their benefits, before detailing how block triangular weight matrices can give models this structure. Finally, to realize these properties we design **StairFormer**: a Transformer architecture whose block triangular weights resemble a staircase you can walk down step by step! Crucially, StairFormer retains strong language modeling performance with this structure. [todo: if results say it is a pareto improvement, say that here]\n\n[say something about how this is a testbed we want the community to build off of]\n# Nested models\n\nNested models are structured such that small submodels can be extracted from a larger trained model. For instance, MatFormer [cite] submodels use only prefixes of the FFN hidden dimension or attention heads. Many methods are based on MatFormer's principles [cite cite cite], where Transformer components are nested into an ordered structure and subnetworks are obtained by truncating weights. Other methods apply methods like low-rank decomposition [cite cite], but the submodel extraction idea is similar. Another family of methods nests by depth such as LayerSkip [cite], which enables a forward pass to early-exit at any layer. In that setup, a nested submodel is a subset of the full model's layers.\n\nThe submodels can be made whatever size you like, so they can fit a phone, a laptop, or a datacenter depending on your needs. Another rationale for nested models is training economics. Given a limited training budget, it's more value to train the best large model you can, from which you extract smaller submodels, than to spread out your resources across the family. Having a single set of weights aligns nicely with post-training, too. You can update the weights of the large model, and the submodel weights follow by design. Some labs have been implementing and developing this idea in released models, e.g. Google with Gemma 3n [cite] and NVIDIA with Nemotron Elastic and Star Elastic [cite]. **Nested models are entering the spotlight, have economic benefits, and work at scale**.\n# Fully nested models\n\nAt a high level, **a fully nested model is one that contains a hierarchy of smaller submodels inside a larger model, where each larger model reuses and extends the smaller submodels\u2019 computation and preserves their outputs as prefixes of its own**. It may help to think of this as LayerSkip, except split by width instead of depth (these two concepts are orthogonal and could be combined). The output of each layer in a submodel is exactly the prefix of the larger models' outputs. This is the strong structural property we can make use of.\n\nTo be more specific, each layer must be *filtration-preserving*. Informally, this means the layer respects the nesting: split the residual stream into ordered blocks, so each prefix of blocks is one submodel's residual stream, and these prefixes form a nested hierarchy (the filtration). A layer is filtration-preserving when each output prefix depends only on the same input prefix: information flows from smaller submodels to larger ones, never backward. As a result, running just a prefix through the network gives *exactly* that submodel's output, and since the property survives composition, checking it layer by layer suffices for the whole model. This is what we mean by *fully nested*: every layer is filtration-preserving, and nested outputs follow as a consequence.\n\n> **Detail expand: formal definitions**\n> **Setup.** Let MATHPLACEHOLDER9X denote the model of budget MATHPLACEHOLDER10X (representing the size of the hidden state), mapping an input to its final hidden representation. It decomposes layer-wise as MATHPLACEHOLDER11X, where layer MATHPLACEHOLDER12X maps MATHPLACEHOLDER13X, with MATHPLACEHOLDER14X and MATHPLACEHOLDER15X. Fix a sequence of budgets MATHPLACEHOLDER16X for the nested family. Their final hidden spaces are nested as a *filtration*:\n> MATHPLACEHOLDER0X\n> and we are equipped with projection maps MATHPLACEHOLDER17X for MATHPLACEHOLDER18X. Concretely, take MATHPLACEHOLDER19X and MATHPLACEHOLDER20X, i.e. truncation to the first MATHPLACEHOLDER21X coordinates (applied per column when inputs are matrices in MATHPLACEHOLDER22X over a context of length MATHPLACEHOLDER23X). This choice of MATHPLACEHOLDER24X respects all element-wise operations, such as vector addition and element-wise multiplication \u2014 so a residual connection MATHPLACEHOLDER25X is filtration-preserving if and only if MATHPLACEHOLDER26X is.\n>\n> **Definition (output nested).** *The family MATHPLACEHOLDER27X is **output nested** if, for every MATHPLACEHOLDER28X,*\n> MATHPLACEHOLDER1X\n> In plain words: a single forward pass of a model MATHPLACEHOLDER29X includes the forward pass of every smaller model MATHPLACEHOLDER30X in the family.\n>\n> We work with a layer-wise strengthening of this, where the hidden spaces at every layer MATHPLACEHOLDER31X form a simultaneous filtration, with projections MATHPLACEHOLDER32X. For consistency, MATHPLACEHOLDER33X (the output filtration), and MATHPLACEHOLDER34X, so all submodels observe the same input embeddings.\n>\n> **Definition (filtration-preserving).** *The family of layers MATHPLACEHOLDER35X is **filtration-preserving** if, for every MATHPLACEHOLDER36X,*\n> MATHPLACEHOLDER2X\n> In other words, projecting into the smaller hidden state after the larger layer produces the same output as projecting before the smaller layer.\n>\n> **Definition (fully nested).** *The family MATHPLACEHOLDER37X is **fully nested** if every layer family MATHPLACEHOLDER38X, MATHPLACEHOLDER39X, is filtration-preserving.*\n>\n> Full nesting is the layer-wise mechanism that makes intermediate computation shareable across the hierarchy; the end-to-end guarantee then comes for free:\n>\n> **Proposition.** *If MATHPLACEHOLDER40X is fully nested, then MATHPLACEHOLDER41X is output-nested.*\n>\n> *Proof.* For any MATHPLACEHOLDER42X, apply the filtration-preserving identity layer by layer:\n> MATHPLACEHOLDER3X\n> Since MATHPLACEHOLDER43X, the left side is MATHPLACEHOLDER44X and the right side is MATHPLACEHOLDER45X. MATHPLACEHOLDER46X\n>\n> This is why checking each layer suffices: the composition of filtration-preserving layers is filtration-preserving, so a fully nested model is output-nested by construction.\n\n**During training**, we can train all the submodels at once, instead of sampling one each step. We have free access to all their output logits at the same time without any added FLOPs. This lets us apply a training signal to all submodels at once. Standard nested models cannot do this because they usually sample choices of submodels per-batch, so some parameters may not get training signal. This capability gives us flexibility in our choice of loss function, too. Instead of standard cross-entropy loss, we can perform KL distillation *while* pretraining, almost for free [cite pre-training distillation]! Another strategy that has shown promise in preliminary experiments is gradient surgery with PCGrad [cite] to ensure submodel gradients don't conflict. The design space for loss design is large here and there's lots to explore.\n\n**During inference**, we can efficiently generate text by routing different tokens to different submodels *after* seeing the first output. This gives us more flexibility than needing to predict which model to route to ahead of time; our routing decisions have much more information to go off of. In a typical setting, this is inefficient because different models can't share the same KV cache. Our case is more favorable: the KV cache of the smaller submodels is a subset of the KV cache of the larger models. So, for how to handle inference of the large model when some tokens in the context were only processed by the small submodel, we have two options: \n1. **Perform sparse attention** for heads which are missing a KV cache for some tokens,\n2. **Write but do not read to the larger KV cache** when running the small model.\n\nWith either option, we have per-token adaptive compute!\n\n### Benefits\n\n**Efficient token-level routing.** Not every token needs the full model: some are easy, some are hard. With a fully nested model, we can run the small submodel first, decide whether we like its output, and only cascade to progressively larger prefixes of the network when we don't. Because the larger models reuse the smaller ones' computation, nothing is thrown away when we escalate. The residual stream and KV cache are already partially complete, and we only pay for the extra blocks. This makes per-token cascades viable.\n\n**Self-speculative decoding.** Speculative decoding speeds up generation by having a small draft model propose tokens that the large target model verifies in parallel. A fully nested model gets a draft model for free, since a submodel can act as one. When the target verifies a draft, part of the work is already done: the submodel's KV cache and activations carry over, so verification only pays for the blocks the draft didn't run. Since we have a whole hierarchy of submodels rather than just one, we could even draft with several sizes at once [cite hierarchical speculative decoding].\n\n**Elastic embedding models.** Matryoshka embeddings [cite] are trained so that prefixes of the embedding vector are themselves useful embeddings. However, the model that produces them runs at a single fixed cost. A fully nested embedding model makes the *inference* elastic too: running a prefix of the network yields exactly that submodel's embedding, which is a prefix of the full model's. This means we can trade inference latency for output granularity per-query. Spend less compute for a coarser embedding, or activate progressively larger portions of the model for a finer one.\n\n## Block lower triangular matrices enable fully nested models\n\nTo make this work, first consider a single linear layer, and split the residual stream into ordered blocks with each prefix corresponding to a nested submodel. The main idea here is the use of *block triangular matrices* for weights. A block lower triangular weight matrix enforces a simple rule when used as a linear layer: **each output block can only depend on the input blocks that came before them**. Later blocks can use information from all prefix blocks, but they cannot add information into earlier blocks. This means each top-left principal submatrix behaves like a smaller independent linear layer.\n\nTo see this in action, notice how the prefix structure is preserved in the animation below. To be precise, these block lower triangular linear layers preserve the filtration induced by prefixes of the residual stream.\n\n> **Detail expand: block lower triangular layers are filtration-preserving**\n> Consider the linear layer MATHPLACEHOLDER47X. In a standard dense parameterization, any output coordinate may depend on any input coordinate. This violates filtration preservation: the first MATHPLACEHOLDER48X output blocks of the large model may depend on input blocks MATHPLACEHOLDER49X, which are unavailable to the smaller model \u2014 so simply truncating the output of a dense linear layer generally does not recover the output of the corresponding smaller layer.\n>\n> A sufficient way to prevent this leakage is to restrict MATHPLACEHOLDER50X to the class of **block lower triangular matrices**:\n> MATHPLACEHOLDER4X\n> where block MATHPLACEHOLDER51X has width MATHPLACEHOLDER52X (with MATHPLACEHOLDER53X), so MATHPLACEHOLDER54X and MATHPLACEHOLDER55X. Then the MATHPLACEHOLDER56X-th output block is\n> MATHPLACEHOLDER5X\n> which depends only on input blocks MATHPLACEHOLDER57X. For any budget MATHPLACEHOLDER58X, define the corresponding submodel layer MATHPLACEHOLDER59X as the leading principal block submatrix (blocks MATHPLACEHOLDER60X with MATHPLACEHOLDER61X).\n>\n> **Proposition.** *The family of linear layers MATHPLACEHOLDER62X is filtration-preserving.*\n>\n> *Proof.* Fix MATHPLACEHOLDER63X and MATHPLACEHOLDER64X. For any block MATHPLACEHOLDER65X, the MATHPLACEHOLDER66X-th output block of MATHPLACEHOLDER67X is MATHPLACEHOLDER68X, which involves only blocks MATHPLACEHOLDER69X \u2014 exactly the MATHPLACEHOLDER70X-th output block of MATHPLACEHOLDER71X. Hence truncating the larger layer's output to the first MATHPLACEHOLDER72X coordinates equals applying the smaller layer to the truncated input: MATHPLACEHOLDER73X. MATHPLACEHOLDER74X\n>\n> Earlier coordinate blocks form a complete smaller model, while later blocks add refinements that may depend on the earlier representation. Computation can proceed block by block: evaluating the first MATHPLACEHOLDER75X blocks produces the same result as running the MATHPLACEHOLDER76X-budget submodel, and continuing to later blocks extends this computation to a larger model without affecting the smaller output.\n\nFIGUREPLACEHOLDER0X\n\nSo we know how to fully nest linear layers with the use of structured matrices, great! Transformers as a whole are more complex than linear layers, though, so it's natural to ask: *how can we get this to work for the whole Transformer?* Turns out, we're already most of the way there! **The only other Transformer component we have to modify is RMSNorm**; everything else is already in place.\n\nThe issue with RMSNorm we solve is that its normalization statistics depend on the entire input vector. The fix is simple: **use the normalization statistics of prefix blocks instead of the whole vector**. Now, information in later blocks has no effect on the output of earlier blocks. In our testing, we found the change had negligible impact on performance. We call the modified operator PrefixRMSNorm, and it can be seen to be filtration-preserving:\nMATHPLACEHOLDER6X\nwhere MATHPLACEHOLDER77X is the MATHPLACEHOLDER78X-th coordinate block, MATHPLACEHOLDER79X is the corresponding block of the gain parameters, and MATHPLACEHOLDER80X is the number of coordinates in the first MATHPLACEHOLDER81X blocks.\n\n> **Detail expand: PrefixRMSNorm is filtration-preserving**\n> Recall standard RMSNorm: given MATHPLACEHOLDER82X,\n> MATHPLACEHOLDER7X\n> It acts coordinate-wise, but the RMS factor is computed from the vector as a whole \u2014 so later coordinates leak information into earlier ones, breaking filtration preservation. PrefixRMSNorm replaces the global statistic with a per-block prefix statistic: block MATHPLACEHOLDER83X is normalized by MATHPLACEHOLDER84X, which sums only over blocks MATHPLACEHOLDER85X.\n>\n> *Proof of filtration preservation.* The MATHPLACEHOLDER86X-th output block MATHPLACEHOLDER87X depends on MATHPLACEHOLDER88X only through MATHPLACEHOLDER89X and MATHPLACEHOLDER90X, both of which are functions of the first MATHPLACEHOLDER91X blocks alone. So for budgets MATHPLACEHOLDER92X, the first MATHPLACEHOLDER93X output blocks of PrefixRMSNorm applied in the larger model coincide with PrefixRMSNorm applied to the truncated input \u2014 the same commuting identity as before. MATHPLACEHOLDER94X\n\n\nFor every other Transformer component, including (element-wise) activations, residual connections, and attention, **block lower triangular matrices give us everything we need**. Element-wise operations like activations and residual connections are fine because later coordinates can't influence earlier ones. Attention is fine too because as long as submodel boundaries coincide with attention head group boundaries, we keep the fully nested structure we want. This way, attention heads are either entirely inside or entirely outside a submodel; they're either on or off.\n\nThis idea can be extended to MoEs too: one possible idea is to nest the experts in addition to their weights, and ensure the router respects the prefix structure.\n## Putting it all together\n\nThis gives us all the ingredients to bring us to our main result: *the construction of a fully nested Transformer*. We call it **StairFormer** since its block lower triangular weights resemble a staircase you can walk down step by step! Put succinctly, StairFormer is Transformer architecture consisting of:\n1. Block lower triangular weights, (where block\nboundaries coincide with attention head group boundaries),\n2. PrefixRMSNorm instead of RMSNorm.\n\nEvery layer is filtration-preserving and so is their composition, making this the fully nested model we desire:\n\n> **Theorem.** *All StairFormer layers are filtration-preserving: StairFormer is fully nested, and therefore output-nested.*\n\n> **Detail expand: proof of the theorem**\n> By the composition result, it suffices to check that each component commutes with prefix truncation, i.e. MATHPLACEHOLDER95X. We go component by component:\n>\n> **Linear layers.** Block lower triangular, so filtration-preserving by the proposition above. This covers all dense maps in the model: the FFN projections, the attention projections MATHPLACEHOLDER96X, and the output head.\n>\n> **Normalization.** PrefixRMSNorm is filtration-preserving by the argument above.\n>\n> **Element-wise operations and residual connections.** Prefix truncation respects element-wise operations, so activations and gating are immediate, and MATHPLACEHOLDER97X is filtration-preserving whenever MATHPLACEHOLDER98X is.\n>\n> **Multi-head self-attention.** Attention is the one nonlinearity that mixes coordinates: within a head, MATHPLACEHOLDER99X lets every coordinate of the head's output depend on every coordinate of its input. The key observation is that this mixing is *contained within heads*. Since block boundaries coincide with head boundaries (group boundaries under GQA), and the MATHPLACEHOLDER100X, MATHPLACEHOLDER101X, MATHPLACEHOLDER102X projections are block lower triangular with respect to this partition, every head belonging to the first MATHPLACEHOLDER103X blocks reads only from the first MATHPLACEHOLDER104X blocks of the input. The output projection MATHPLACEHOLDER105X is also block lower triangular, so the first MATHPLACEHOLDER106X output blocks depend only on the first MATHPLACEHOLDER107X heads' outputs. Hence for any budget MATHPLACEHOLDER108X,\n> MATHPLACEHOLDER8X\n> i.e. running self-attention on the prefix representation gives exactly the prefix of the full self-attention output. Smaller models simply activate a subset of the heads \u2014 which is also why their KV cache is a strict subset of the larger models'.\n>\n> Every StairFormer layer is a composition of these components, so every layer is filtration-preserving \u2014 StairFormer is fully nested by definition, and by the proposition in the first detail expand, output-nested. MATHPLACEHOLDER109X\n\nThis is the type of construction that is greater than the sum of its parts. If any one component of the model didn't have the nice properties we described, we wouldn't be able to end at the result we did. The fact that structured matrices by themselves get us most of the way there is rather surprising. Perhaps even more surprising, performance stays strong!\n\n## Empirical performance\n\n[todo: put in numbers once eval is finished in a couple hours; explain training and baseline setup; mention muon as a footnote; reiterate that performance stays strong]\n\n# Remarks\n[todo: write conclusion]";
